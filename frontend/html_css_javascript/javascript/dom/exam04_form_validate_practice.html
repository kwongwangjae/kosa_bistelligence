<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css" integrity="sha384-xOolHFLEh07PJGoPkLv1IbcEPTNtaed2xpHsD9ESMhqIYd0nLMwNLD69Npy4HI+N" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/jquery@3.5.1/dist/jquery.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-Fy6S3B9q64WdZWQUiU+q4/2Lc9npb8tCaSX9FK7E8HnRr0Jz8D6OP9dO5Vg3Q9ct" crossorigin="anonymous"></script>

    
</head>
<body>
    <script>
      function handleCheckData() {
        //form의 action 기능을 취소
        event.preventDefault();

        //전체 유효성 검사의 결과
        let resultCheckData = true;
        
        //uid 유효성 검사
        var uidPattern = /^(?=.*\d)(?=.*[a-z])(?=.*[A-Z]).{6,10}$/;
        var uid = document.querySelector("#uid").value;
        if(uidPattern.test(uid)) {
          document.querySelector("#uid").classList.remove("bg-danger");
        } else {
          document.querySelector("#uid").classList.add("bg-danger");
          resultCheckData = false;
        }

        //email 유효성 검사
        var emailPattern = /^[a-zA-Z0-9+-\_.]+@[a-zA-Z0-9-]+\.[a-zA-Z0-9-.]+$/;
        var email = document.querySelector("#uemail").value;
        if(emailPattern.test(email)) {
          document.querySelector("#uemail").classList.remove("bg-danger");
        } else {
          document.querySelector("#uemail").classList.add("bg-danger");
          resultCheckData = false;
        }

        //password 유효성 검사
        var passwordPattern = /^(?=.*\d)(?=.*[a-z])(?=.*[A-Z]).{8,15}$/; 
        var password = document.querySelector("#upassword").value;
        if(passwordPattern.test(password)) {
          document.querySelector("#upassword").classList.remove("bg-danger");
        } else {
          document.querySelector("#upassword").classList.add("bg-danger");
          resultCheckData = false;
        }

        //phone 유효성 검사
        var phonePattern = /^010-\d{3,4}-\d{4}$/; 
        var phone = document.querySelector("#uphone").value;
        var phonePatternTest = phonePattern.test(phone);
        if(phonePatternTest) {
            document.querySelector("#uphone").classList.remove("bg-danger");
        } else {
            document.querySelector("#uphone").classList.add("bg-danger");
            resultCheckData = false;
        }

        //체크된 취미값 얻기
        var checkedHobby = document.querySelectorAll("input[name='uhobby']:checked");
        var checkedHobbyArray = [];

        checkedHobby.forEach((checkbox) => {
          checkedHobbyArray.push(checkbox.value);
        });
        console.log(checkedHobbyArray);

        if(resultCheckData) {
          var formData = {
            uid,
            email,
            password,
            phone,
            city: document.querySelector("#ucity").value,
            hobby: checkedHobbyArray,
            job: document.querySelector("input[name='ujob']:checked").value
          };
          console.log(formData);

          document.querySelector("#uid").value = "";
          document.querySelector("#uemail").value = "";
          document.querySelector("#upassword").value = "";
          document.querySelector("#uphone").value = "";
          document.querySelector("#ucity").value = "";
          document.querySelectorAll("input[name='uhobby']:checked").forEach((checkbox) => {
            checkbox.checked = false;
          });
          document.querySelector("input[name='ujob']:checked").checked = false;
        } else {
          console.log("데이터가 유효하지 않음");
        }
      }
    </script>
    <div class="card">
        회원가입
      </div>
    <form id="joinForm" name="joinForm" action="exam04_form_validate.html" onsubmit="handleCheckData()" novalidate class="m-5">
        <div class="form-group">
          <label for="uid">ID</label>
          <input type="text" class="form-control" id="uid"/>
          <small id="uidHelp" class="form-text text-muted">알파벳 대소문자, 숫자를 혼용해서 6자 이상 10자 이하</small>
        </div>
      
        <div class="form-group m-2">
          <label for="uemail">Email</label>
          <input type="email" class="form-control" id="uemail"/>
        </div>
      
        <div class="form-group m-2">
          <label for="upassword">Password</label>
          <input type="password" class="form-control" id="upassword"/>
          <small id="passwordHelp" class="form-text text-muted">알파벳 대소문자, 숫자를 혼용해서 8자 이상 15자 이하</small>
        </div>
      
        <div class="form-group m-2">
          <label for="uphone">Phone</label>
          <input type="text" class="form-control" id="uphone"/>
          <small id="phoneHelp" class="form-text text-muted">예) 010-123-1234, 010-1234-1234</small>
        </div>
      
        <div class="form-group m-2">
          <label for="ucity">City</label>
          <select id="ucity" class="form-control">
            <option value="seoul">서울</option>
            <option value="pusan">부산</option>
            <option selected value="jeju">제주</option>
          </select>
        </div>
      
        <div class="form-group m-2">
          <label for="uhobby">Hobby</label>
          <div class="form-check">
            <input type="checkbox" name="uhobby" value="movie" checked/>
            <label> 영화 </label>
            <input type="checkbox" name="uhobby" value="trip" checked/>
            <label> 여행 </label>
            <input type="checkbox" name="uhobby" value="game" />
            <label> 게임 </label>
          </div>
        </div>
      
        <div class="form-group m-2">
          <label for="ujob">Job</label>
          <div class="form-check">
            <input type="radio" name="ujob" value="developer" />
            <label> 개발자 </label>
            <input type="radio" name="ujob" value="designer" checked/>
            <label> 디자이너 </label>
            <input type="radio" name="ujob" value="manager" />
            <label> 매니저 </label>
          </div>
        </div>
      
        <div class="text-center">
          <button type="btn btn-info btn-sm">회원가입</button>
          <script>
            document.querySelector("button").addEventListener("click", function() {
              handleCheckData();
            });
          </script>
          <!-- 
          [문제]
          회원 가입 버튼을 클릭하면
          사용자가 입력한 내용을 검사하는 코드를 작성합니다.
          만약 하나라도 유효하지 않는 데이터라면 콘솔에 
          "데이터가 유효하지 않음" 이라고 출력하세요
          
          모든 데이터가 유효하다면 다음과 같이 콘솔에 객체로 출력하세요

          {
            uid:'abc',
            upassword:'123',
            uemail:'[EMAIL_ADDRESS]',
            uphone:'010-123-1234',
            ucity:'seoul',
            uhobby:['movie','game'],
            ujob:'developer'
          }
           -->
        </div>
    </form>
</body>
</html>
