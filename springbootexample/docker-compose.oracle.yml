services:
  oracle:
    image: gvenzl/oracle-free:23.26.1-slim
    container_name: springbootexample-oracle
    ports:
      - "1521:1521"
      - "5500:5500"
    environment:
      TZ: Asia/Seoul
      ORACLE_PASSWORD: oracle
      ORACLE_DATABASE: ORCL
      APP_USER: user_spring
      APP_USER_PASSWORD: oracle
    volumes:
      - oracle-data:/opt/oracle/oradata
    healthcheck:
      test: ["CMD", "healthcheck.sh"]
      interval: 20s
      timeout: 10s
      retries: 15
      start_period: 60s
    restart: unless-stopped

volumes:
  oracle-data:
